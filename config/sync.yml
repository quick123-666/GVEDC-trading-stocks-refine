# 数据同步配置
sync:
  # 同步策略
  strategies:
    realtime:
      enabled: true
      interval: 1s
      batch_size: 100
    periodic:
      enabled: true
      interval: 5m
      batch_size: 1000
    full:
      enabled: true
      interval: 24h
      batch_size: 10000

  # 同步映射
  mappings:
    # 交易股票数据同步
    trading_stocks:
      source: relational
      targets:
        - vector
      fields:
        id:
          vector: doc_id
        content:
          vector: document

  # 冲突解决
  conflict_resolution:
    strategy: last_write_wins
    retry:
      enabled: true
      attempts: 3
      delay: 5s